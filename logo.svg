<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- A Mark -->
  <g transform="translate(0, 2)">
    <!-- Left leg -->
    <path d="M12 44 L24 4 L26 4 L14 44 Z" fill="#C9A84C"/>
    <!-- Right leg -->
    <path d="M38 44 L26 4 L24 4 L36 44 Z" fill="#C9A84C" opacity="0.85"/>
    <!-- Crossbar -->
    <rect x="17" y="28" width="16" height="2.5" rx="0.5" fill="#C9A84C"/>
    <!-- Neural nodes -->
    <circle cx="25" cy="18" r="1.8" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="19" cy="34" r="1.4" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="31" cy="34" r="1.4" fill="#22D3EE" filter="url(#glow)"/>
    <!-- Connection lines -->
    <line x1="25" y1="18" x2="19" y2="34" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>
    <line x1="25" y1="18" x2="31" y2="34" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>
    <line x1="19" y1="34" x2="31" y2="34" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>
  </g>
  <!-- Text: ABITAT -->
  <text x="50" y="28" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="#C9A84C" letter-spacing="3">ABITAT</text>
  <!-- Text: TECHNOLOGY -->
  <text x="50" y="42" font-family="DM Sans, sans-serif" font-weight="400" font-size="8.5" fill="#71717A" letter-spacing="4">TECHNOLOGY</text>
</svg>
